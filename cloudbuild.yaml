steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '-f'
      - 'Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - 'push'
      - '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - '${_SERVICE_NAME}'
      - '--platform=${_PLATFORM}'
      - '--image=${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=${COMMIT_SHA},gcb-build-id=${BUILD_ID},gcb-trigger-id=${_TRIGGER_ID}'
      - '--region=${_DEPLOY_REGION}'
      - '--quiet'

  # Keep the nightly re-index job on the same image. `jobs deploy` creates the
  # job on first run and updates it afterwards. Env vars set manually on the
  # job (PG_DSN) persist across deploys; --update-env-vars only touches the
  # listed keys.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: DeployReindexJob
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'ecen-reindex'
      - '--image=${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--region=${_DEPLOY_REGION}'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--task-timeout=45m'
      - '--max-retries=1'
      - '--command=sh'
      - '--args=-c,cd /app/crawler && python ingest.py --diff'
      - '--update-env-vars=EMBEDDING_MODEL=all-MiniLM-L6-v2'
      - '--quiet'

images:
  - '${_AR_HOSTNAME}/${_AR_PROJECT_ID}/${_AR_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY

# Defaults — trigger-level substitution variables override these.
substitutions:
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _AR_PROJECT_ID: gcp-clen-ecen-ai-initiatives
  _AR_REPOSITORY: cloud-run-source-deploy
  _SERVICE_NAME: ecen-chatbot
  _DEPLOY_REGION: us-central1
  _PLATFORM: managed
  _TRIGGER_ID: manual
