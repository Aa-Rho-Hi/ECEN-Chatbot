name: Claude Code Review

# Automatic, read-only review on every PR (including the fix PRs Claude opens).
# Posts review feedback as a comment. It does NOT approve or merge — the human
# reviewer makes the merge decision.

on:
  pull_request:
    types: [opened, synchronize]
    # Uncomment to scope reviews to specific paths:
    # paths:
    #   - "backend/**"
    #   - "crawler/**"
    #   - "frontend/**"

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # post the review comment
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for the TAMU ECE RAG chatbot. Focus on:
            - Correctness: does the change actually fix the reported issue
              without regressing retrieval / generation behavior?
            - Secrets: ensure no API keys, DSNs, or .env values are committed.
            - Python: backend/ and crawler/ should stay py_compile-clean; flag
              changes to retriever.py / generator.py / graph_retriever.py that
              could affect roster injection or answer completeness.
            - Frontend: TypeScript correctness in frontend/.
            Leave concise, actionable review comments. Do not approve or merge.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 15
