name: Codex Implement (fix)

# Phase 2 of the report → fix loop. The maintainer approves a triaged plan by
# commenting "@codex implement" on the issue. Codex then writes the fix and the
# workflow opens a PR — but ONLY if the backend still compiles. A human merges.
#
#   Job 1 (codex):   implements the fix in the workspace, runs a py_compile gate,
#                    emits a diff. Has OPENAI_API_KEY but only `contents: read`.
#   Job 2 (open_pr): applies the diff + opens the PR. Write access, NO api key.

on:
  issue_comment:
    types: [created]

jobs:
  codex:
    # Only the explicit approval phrase triggers an implementation run.
    if: ${{ github.event.issue && contains(github.event.comment.body, '@codex implement') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      issue_number: ${{ github.event.issue.number }}
      compile_ok: ${{ steps.compile.outputs.ok }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run Codex (implement the approved fix)
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: codex-output.md
          prompt: |
            You are the maintainer agent for the TAMU ECE RAG chatbot.
            Read AGENTS.md for the file map and how to verify changes.

            The maintainer APPROVED fixing issue #${{ github.event.issue.number }}.
            Issue:
            ----
            Title: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}
            ----
            Approval comment (may contain extra instructions):
            ${{ github.event.comment.body }}
            ----
            Implement the smallest correct fix by editing files in the working
            tree. Do NOT break the backend: keep every Python file importable and
            py_compile-clean, and don't change unrelated behavior (retrieval,
            roster injection, answer completeness). Run `python -m py_compile
            backend/*.py crawler/*.py` yourself before finishing. Summarize the
            root cause and your change in your final message. Do not run git or
            open a PR — the workflow does that.

      - name: Verify backend still compiles (gate)
        id: compile
        run: |
          if python -m py_compile backend/*.py crawler/*.py; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "py_compile passed."
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "py_compile FAILED — will not open a PR."
          fi

      - name: Capture diff (only if it compiles)
        run: |
          if [ "${{ steps.compile.outputs.ok }}" = "true" ]; then
            git add -A
            git diff --cached > codex.patch || true
          else
            : > codex.patch
          fi
          echo "----- proposed patch -----"; cat codex.patch || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: codex-results
          path: |
            codex.patch
            codex-output.md
          if-no-files-found: ignore

  open_pr:
    needs: codex
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: codex-results

      - name: Apply patch (if any)
        id: apply
        run: |
          if [ -s codex.patch ]; then
            git apply codex.patch && echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          rm -f codex.patch codex-output.md

      - name: Open Pull Request
        if: steps.apply.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/fix-issue-${{ needs.codex.outputs.issue_number }}
          base: main
          title: "Fix issue #${{ needs.codex.outputs.issue_number }} (Codex)"
          body: |
            Automated fix proposed by **Codex** for issue #${{ needs.codex.outputs.issue_number }}, after maintainer approval.

            ${{ needs.codex.outputs.final_message }}

            ---
            ✅ Passed the `py_compile` gate. ⚠️ Review required — this PR will not auto-merge. Closes #${{ needs.codex.outputs.issue_number }} when merged.
          delete-branch: true

      - name: Comment result on the issue
        uses: actions/github-script@v7
        env:
          FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          CHANGED: ${{ steps.apply.outputs.changed }}
          COMPILE_OK: ${{ needs.codex.outputs.compile_ok }}
          ISSUE_NUMBER: ${{ needs.codex.outputs.issue_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const compileOk = process.env.COMPILE_OK === 'true';
            const changed = process.env.CHANGED === 'true';
            const msg = process.env.FINAL_MESSAGE || '(no message returned)';
            let header;
            if (!compileOk) {
              header = '❌ Codex made a change but it failed the `py_compile` gate, so no PR was opened (this protects the backend from a broken build). See its notes below — you can refine and comment `@codex implement` again.';
            } else if (changed) {
              header = '✅ Codex implemented the approved fix and opened a PR (passed the compile gate). Review and merge when ready.';
            } else {
              header = '🤖 Codex did not change any code. See its reasoning below.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `${header}\n\n${msg}`,
            });
