name: AI Implement (fix)

# Phase 2 of the report → fix loop. The maintainer approves a triaged plan by
# commenting "@codex implement" on the issue. A Python script calls the OpenAI
# API directly on the runner (no container isolation), writes the fix, and the
# workflow opens a PR — but ONLY if the backend still compiles. A human merges.

on:
  issue_comment:
    types: [created]

jobs:
  implement:
    if: ${{ github.event.issue && contains(github.event.comment.body, '@codex implement') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenAI SDK
        run: pip install openai

      - name: Generate and apply fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER:   ${{ github.event.issue.number }}
          ISSUE_TITLE:    ${{ github.event.issue.title }}
          ISSUE_BODY:     ${{ github.event.issue.body }}
          COMMENT_BODY:   ${{ github.event.comment.body }}
        run: python .github/scripts/implement.py

      - name: Verify backend compiles (gate)
        id: compile
        run: |
          if python -m py_compile backend/*.py crawler/*.py 2>&1; then
            echo "ok=true"  >> "$GITHUB_OUTPUT"
            echo "py_compile passed."
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "py_compile FAILED — will not open a PR."
          fi

      - name: Check for changes
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No files changed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: Open Pull Request
        if: steps.compile.outputs.ok == 'true' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/fix-issue-${{ github.event.issue.number }}
          base: main
          title: "Fix issue #${{ github.event.issue.number }} (AI)"
          body: |
            Automated fix for issue #${{ github.event.issue.number }}.

            ✅ Passed the `py_compile` gate.
            ⚠️ Review required — this PR will not auto-merge.

            Closes #${{ github.event.issue.number }} when merged.
          delete-branch: true

      - name: Comment result on the issue
        uses: actions/github-script@v7
        env:
          COMPILE_OK:   ${{ steps.compile.outputs.ok }}
          CHANGED:      ${{ steps.diff.outputs.changed }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const compileOk = process.env.COMPILE_OK === 'true';
            const changed   = process.env.CHANGED   === 'true';
            let msg;
            if (changed && compileOk) {
              msg = '✅ Fix implemented and PR opened. Review and merge when ready.';
            } else if (!changed) {
              msg = '🤖 No code changes were produced. Try commenting `@codex implement` again or apply the fix manually.';
            } else {
              msg = '❌ A fix was generated but failed the `py_compile` gate — no PR opened. See the Actions log for details.';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: msg,
            });
