name: Claude Code

# Agentic issue → verify → fix → PR loop.
# A tester opens an Issue describing a bug (or comments "@claude ...") and Claude:
#   1. Reads the issue + reproduces/verifies it against the code
#   2. If confirmed, implements a fix on a NEW branch
#   3. Opens a Pull Request for human review
# It NEVER merges. A human approves and merges the PR. See AGENTIC_SETUP.md.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when "@claude" is mentioned, OR when a new issue is opened
    # (so testers can just file a bug and have Claude triage it automatically).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create branches / commit fixes
      pull-requests: write     # open PRs
      issues: write            # comment back on the issue
      id-token: write
      actions: read            # read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # System guidance for the verify-then-fix workflow. Claude opens a PR;
          # it must never merge or push directly to the default branch.
          prompt: |
            You are the maintainer agent for the TAMU ECE RAG chatbot.

            When responding to an ISSUE that reports a bug:
            1. VERIFY first. Read the relevant code (see CLAUDE.md for the file
               map) and determine whether the reported behavior is a real bug.
               State clearly whether you could confirm it and your reasoning.
            2. If you CANNOT confirm it, comment on the issue explaining what you
               found and what info you'd need. Do NOT change code.
            3. If you CAN confirm it, create a new branch named
               `claude/fix-issue-<number>`, implement the smallest correct fix,
               and open a Pull Request describing the root cause and the change.
            4. NEVER merge, force-push, or push to `main`. A human reviews and
               merges every PR.

          claude_args: |
            --model claude-opus-4-6
            --max-turns 25
            --allowedTools "Bash(python -m py_compile *),Bash(python -m pytest *),Bash(npm install),Bash(npm run build),Bash(npm run lint:*),Bash(npm run test:*)"
